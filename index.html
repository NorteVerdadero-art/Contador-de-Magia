<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Lily"/>
<meta name="theme-color" content="#111"/>
<link rel="manifest" href="manifest.json"/>
<title>Lily — Life Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);--sr:env(safe-area-inset-right,0px);
  --p0:#E63946;--p1:#F4A261;--p2:#2A9D8F;--p3:#457B9D;--p4:#8338EC;--p5:#06D6A0;
  --hub:66px;
  --bg:#111;--surface:#1a1a1a;--border:#242424;--text:#fff;--muted:#666;--dim:#333;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg)}
body{font-family:'DM Sans',system-ui,sans-serif;color:var(--text);overscroll-behavior:none}

/* ── SETUP ── */
#setup{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;padding-top:calc(var(--st)+20px);padding-bottom:calc(var(--sb)+20px)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:60px;letter-spacing:8px;color:#fff;line-height:1}
.logo-s{font-size:10px;color:#333;letter-spacing:4px;text-transform:uppercase;margin-bottom:36px}
.ss{width:100%;max-width:310px;margin-bottom:22px}
.sl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2a2a2a;margin-bottom:9px}
.pcr{display:flex;gap:7px}
.pcb{flex:1;height:50px;border-radius:12px;border:2px solid #1e1e1e;background:#161616;color:#333;font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;cursor:pointer;transition:all .14s}
.pcb.sel{border-color:rgba(255,255,255,.35);color:#fff;background:#1e1e1e}
.pcb:active{transform:scale(.95)}
.lrow{display:flex;gap:7px;margin-top:7px}
.lb{flex:1;height:40px;border-radius:10px;border:2px solid #1e1e1e;background:#161616;color:#333;font-family:'Bebas Neue',sans-serif;font-size:18px;cursor:pointer;transition:all .14s}
.lb.sel{border-color:rgba(255,255,255,.35);color:#fff;background:#1e1e1e}
.nlist{display:flex;flex-direction:column;gap:7px;margin-top:9px}
.nr{display:flex;align-items:center;gap:9px}
.npill{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.ninp{flex:1;background:#161616;border:2px solid #1e1e1e;border-radius:10px;padding:10px 13px;font-size:15px;color:#fff;outline:none;-webkit-appearance:none}
.ninp::placeholder{color:#242424}
.ninp:focus{border-color:#2a2a2a}
.gobtn{width:100%;max-width:310px;height:52px;background:#fff;border:none;border-radius:13px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#111;cursor:pointer;margin-top:4px;-webkit-appearance:none}
.gobtn:active{background:#ddd;transform:scale(.99)}

/* ── BOARD ── */
#game{position:fixed;inset:0;display:none;overflow:hidden}
.board{width:100%;height:100%;display:grid;position:relative;overflow:hidden}
.board.p2{grid-template-columns:1fr 1fr}
.board.p3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.board.p4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}

/* ── QUADS ── */
.quad{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;transition:filter .12s}
.quad:active{filter:brightness(.8)}
/* Línea central divisoria tenue */
.quad::after{content:'';position:absolute;top:50%;left:8%;right:8%;height:1px;background:rgba(255,255,255,.08);pointer-events:none}
.quad.dead{filter:grayscale(.9) brightness(.3)}
.board.p4 .quad:nth-child(1){border-right:2.5px solid rgba(0,0,0,.3);border-bottom:2.5px solid rgba(0,0,0,.3)}
.board.p4 .quad:nth-child(2){border-bottom:2.5px solid rgba(0,0,0,.3)}
.board.p4 .quad:nth-child(3){border-right:2.5px solid rgba(0,0,0,.3)}
.board.p4 .quad:nth-child(1) .qi,.board.p4 .quad:nth-child(2) .qi{transform:rotate(180deg)}
.board.p2 .quad:nth-child(1){border-right:2.5px solid rgba(0,0,0,.3)}
.board.p2 .quad:nth-child(1) .qi{transform:rotate(90deg)}
.board.p2 .quad:nth-child(2) .qi{transform:rotate(-90deg)}
.board.p3 .quad:nth-child(1){border-right:2.5px solid rgba(0,0,0,.3);border-bottom:2.5px solid rgba(0,0,0,.3)}
.board.p3 .quad:nth-child(2){border-bottom:2.5px solid rgba(0,0,0,.3)}
.board.p3 .quad:nth-child(1) .qi,.board.p3 .quad:nth-child(2) .qi{transform:rotate(180deg)}
.board.p3 .quad:nth-child(3){grid-column:1/-1}

.qi{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;pointer-events:none;padding:14px;position:relative}
/* Safe area para quads superiores rotados */
.board.p4 .quad:nth-child(1) .qi,.board.p4 .quad:nth-child(2) .qi,
.board.p3 .quad:nth-child(1) .qi,.board.p3 .quad:nth-child(2) .qi,
.board.p2 .quad:nth-child(1) .qi{padding-top:calc(14px + var(--st))}
/* Indicadores de mitad tap */
.qi::before{content:'＋';position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;color:rgba(255,255,255,.18);letter-spacing:1px;pointer-events:none}
.qi::after{content:'－';position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;color:rgba(255,255,255,.18);letter-spacing:1px;pointer-events:none}

/* Life */
.ql{font-family:'Bebas Neue',sans-serif;font-size:clamp(68px,21vw,144px);line-height:.88;color:#fff;text-shadow:0 6px 28px rgba(0,0,0,.3);letter-spacing:-2px}
.ql.warn{color:#ffe066}.ql.low{color:#ff6b6b;animation:thr 1.1s ease-in-out infinite}
.ql.dead-c{opacity:.25;text-decoration:line-through}
@keyframes thr{0%,100%{opacity:1}50%{opacity:.45}}

.qn{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:4px}

/* Chips */
.qch{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:8px;max-width:190px}
.chip{font-size:10px;font-weight:700;background:rgba(0,0,0,.22);border:1.5px solid rgba(255,255,255,.18);border-radius:20px;padding:2px 8px;color:rgba(255,255,255,.82);display:inline-flex;align-items:center;gap:3px}
.chip.hot{border-color:rgba(255,107,107,.8);color:#ff6b6b}
.chip.mana{border-color:rgba(100,160,255,.6);color:rgba(160,200,255,.9)}

/* Mana badge */
.qmana{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;pointer-events:none}
.qmana-i{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:3px}
.qmana-n{font-family:'Bebas Neue',sans-serif;font-size:19px;color:rgba(160,200,255,.75);line-height:1}

/* Turn indicator */
.qturn{position:absolute;top:8px;left:0;right:0;display:flex;justify-content:center;pointer-events:none}
.qturn-badge{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:2px 10px;color:#fff}

/* Dead */
.qdead{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5);font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:rgba(255,255,255,.18)}
.quad.dead .qdead{display:flex}

/* Flash */
@keyframes flash{0%{filter:brightness(1.7)}100%{filter:brightness(1)}}
.quad.flash{animation:flash .28s ease-out}

/* Mana toast — aparece en el cuadrante y sube flotando */
.mana-toast{
  position:absolute;
  left:50%;transform:translateX(-50%);
  bottom:30%;
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:2px;
  color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.5);
  pointer-events:none;
  white-space:nowrap;
  animation:mana-float 1.4s ease-out forwards;
  z-index:10;
}
.mana-toast.neg{color:#ff9a9a}
.mana-toast.set{font-size:22px;color:rgba(160,200,255,.95)}
@keyframes mana-float{
  0%  {opacity:1;transform:translateX(-50%) translateY(0)   scale(1)}
  20% {opacity:1;transform:translateX(-50%) translateY(-8px) scale(1.08)}
  100%{opacity:0;transform:translateX(-50%) translateY(-52px) scale(.9)}
}

/* ── CENTER HUB ── */
#hub{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
#hub-row{display:flex;align-items:center;gap:8px;pointer-events:none}

/* Turn counter pill above mic */
#turn-pill{
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;
  background:rgba(10,10,10,.85);border:1.5px solid rgba(255,255,255,.1);
  border-radius:20px;padding:3px 12px;color:rgba(255,255,255,.6);
  backdrop-filter:blur(8px);cursor:pointer;
  display:flex;align-items:center;gap:6px;
;pointer-events:auto}
#turn-pill:active{opacity:.7}
#turn-n{color:#fff;font-size:16px}
#turn-timer{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:1px}

#mic-btn{
  width:var(--hub);height:var(--hub);border-radius:50%;
  border:2px solid rgba(255,255,255,.08);
  background:rgba(8,8,8,.9);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:23px;-webkit-appearance:none;transition:all .2s;
;pointer-events:auto}
#mic-btn{touch-action:manipulation}
#mic-btn:active{transform:scale(.88)}
#mic-btn.on{border-color:rgba(255,70,70,.8);background:rgba(130,10,10,.9);animation:mglow 1.1s ease-in-out infinite}
#mic-btn.hot{border-color:rgba(255,200,0,.9);background:rgba(90,55,0,.9)}
@keyframes mglow{0%,100%{box-shadow:0 0 0 0 rgba(255,50,50,.4)}50%{box-shadow:0 0 0 14px rgba(255,50,50,0)}}

/* Priority / turn button */
#priority-btn{
  width:38px;height:38px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.12);
  background:rgba(8,8,8,.8);backdrop-filter:blur(8px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;-webkit-appearance:none;
;pointer-events:auto}
#priority-btn:active{transform:scale(.9);background:rgba(30,30,30,.9)}
#priority-btn.active{border-color:rgba(100,220,100,.6);background:rgba(0,60,0,.8)}

#menu-btn{
  width:30px;height:30px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.07);
  background:rgba(8,8,8,.75);backdrop-filter:blur(8px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:0;-webkit-appearance:none;
;pointer-events:auto}
#menu-btn{touch-action:manipulation}
#menu-btn:active{background:rgba(28,28,28,.9)}
.md{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.38);margin:1.5px 0}

/* ── VOICE BAR ── */
#vbar{position:fixed;bottom:0;left:0;right:0;padding:9px 18px calc(var(--sb)+9px);background:rgba(6,6,6,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.05);display:none;flex-direction:column;gap:2px;z-index:60;pointer-events:none}
#vbar.show{display:flex;pointer-events:auto}
@media (orientation:landscape) and (max-height:500px){
  #vbar{flex-direction:row;align-items:center;gap:8px;padding:6px 18px calc(var(--sb)+6px)}
  #vbar.show{max-height:44px}
  #vi{display:none}
  #hub{top:50%;left:50%}
}
#vi{font-size:10px;color:rgba(255,255,255,.28);font-style:italic;min-height:13px}
#vh{font-size:12px;color:rgba(255,255,255,.55);min-height:14px}
#vh .ww{font-weight:700;color:#fff;border-bottom:1.5px solid rgba(255,255,255,.35)}
#va{font-size:15px;font-weight:700;color:#fff;min-height:18px}
#ve{font-size:10px;color:#ff6b6b;min-height:13px}

/* ── SHEET ── */
#sov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);display:none;align-items:flex-end}
#sov.open{display:flex;animation:fi .17s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
#sheet{width:100%;background:#0e0e0e;border-radius:22px 22px 0 0;padding:0 0 calc(var(--sb)+14px);animation:su .24s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh{width:36px;height:4px;background:#242424;border-radius:2px;margin:11px auto 0}
.shd{display:flex;align-items:center;justify-content:space-between;padding:calc(13px + var(--st)) 18px 9px;border-bottom:1px solid #161616;position:sticky;top:0;background:#0e0e0e;z-index:1}
.sht{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px;color:#fff}
.shc{width:30px;height:30px;border-radius:50%;background:#1a1a1a;border:none;color:#555;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ssec{padding:13px 18px;border-bottom:1px solid #141414}
.ssec:last-child{border-bottom:none}
.slbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2a2a2a;margin-bottom:11px}

/* Life ctrl */
.lc{display:flex;align-items:center;border:1.5px solid #1a1a1a;border-radius:13px;overflow:hidden}
.lcb{flex:0 0 60px;height:62px;background:#161616;border:none;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:20px;cursor:pointer;-webkit-appearance:none}
.lcb:active{background:#1e1e1e}
.lcb.m{color:#ff6b6b}.lcb.m:active{background:#2a1515}
.lcb.big{flex:0 0 48px;font-size:12px;font-weight:700;border-left:1px solid #1a1a1a}
.lcb.big:first-child{border-left:none;border-right:1px solid #1a1a1a}
.lcn{flex:1;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:40px;color:#fff;border-left:1px solid #181818;border-right:1px solid #181818;padding:7px}
.lpre{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.lpb{flex:1;min-width:50px;padding:8px;border:1.5px solid #1a1a1a;border-radius:8px;background:#161616;color:#555;font-family:'Bebas Neue',sans-serif;font-size:16px;cursor:pointer;text-align:center;-webkit-appearance:none}
.lpb:active{border-color:#fff;color:#fff}

/* Mana */
.mrow{display:flex;align-items:center;gap:12px}
.mn{font-family:'Bebas Neue',sans-serif;font-size:50px;color:rgba(160,200,255,.9);min-width:60px;text-align:center;line-height:1}
.mbtns{display:flex;gap:7px;flex-wrap:wrap}
.mb{width:42px;height:42px;border-radius:9px;border:1.5px solid #1a1a1a;background:#161616;color:#fff;font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
.mb:active{background:#1e1e1e}
.mb.mm{color:#ff6b6b;border-color:#2a1515}.mb.mm:active{background:#2a1515}
.mclr{font-size:9px;font-weight:700;letter-spacing:1px;color:#2a2a2a;border:1.5px solid #1a1a1a;border-radius:7px;padding:4px 9px;background:transparent;cursor:pointer;-webkit-appearance:none}
.mclr:active{color:#fff;border-color:#fff}

/* Counters */
.crows{display:flex;flex-direction:column;gap:6px}
.crow{display:flex;align-items:center;gap:11px;padding:9px 11px;background:#161616;border-radius:9px}
.cico{font-size:17px;width:22px;text-align:center}
.ci{flex:1}.cn{font-size:12px;font-weight:700;color:#fff}.cs{font-size:9px;color:#2a2a2a;margin-top:1px}
.cbtns{display:flex;align-items:center;gap:7px}
.cv{font-family:'Bebas Neue',sans-serif;font-size:21px;color:#fff;min-width:26px;text-align:center}
.cb{width:36px;height:36px;border-radius:7px;border:1.5px solid #1a1a1a;background:#111;color:#fff;font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
.cb:active{background:#1e1e1e}
.cb.m{color:#ff6b6b;border-color:#2a1515}.cb.m:active{background:#2a1515}
.cb.p:active{background:#152a15}
.lp{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;background:#2a1515;color:#ff6b6b}
.lp.max{background:#ff6b6b;color:#fff;animation:thr 1s steps(2) infinite}

/* States */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.stg{display:flex;align-items:center;gap:8px;padding:11px;background:#161616;border-radius:9px;border:1.5px solid #161616;cursor:pointer;-webkit-appearance:none;width:100%;text-align:left}
.stg.on{border-color:rgba(255,255,255,.12);background:#1c1c1c}
.sti{font-size:17px}.stt{font-size:11px;font-weight:700;color:#333;line-height:1.3}
.stg.on .stt{color:#fff}

/* CMD */
.cmdrows{display:flex;flex-direction:column;gap:5px}
.cmdr{display:flex;align-items:center;gap:9px;padding:8px 11px;background:#161616;border-radius:8px}
.cmdf{font-size:11px;font-weight:700;color:#fff;flex:1}
.cmdbw{flex:2;height:5px;background:#1e1e1e;border-radius:2px;overflow:hidden}
.cmdbar{height:100%;background:#E63946;border-radius:2px;transition:width .3s}
.cmdn{font-family:'Bebas Neue',sans-serif;font-size:15px;color:#ff6b6b;min-width:40px;text-align:right}
.cmdbs{display:flex;gap:4px}
.cmdb{width:26px;height:26px;border-radius:5px;border:1px solid #1a1a1a;background:#111;color:#fff;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
.cmdb.m{color:#ff6b6b}.cmdb:active{background:#1e1e1e}

/* Custom add */
.cadd{display:flex;gap:7px;margin-top:7px}
.cinp{flex:1;background:#161616;border:1.5px solid #1a1a1a;border-radius:8px;padding:9px 13px;font-size:15px;color:#fff;outline:none;-webkit-appearance:none}
.cinp:focus{border-color:#2a2a2a}
.caddb{padding:9px 14px;background:#fff;border:none;border-radius:8px;color:#111;font-weight:700;font-size:12px;cursor:pointer;-webkit-appearance:none;white-space:nowrap}

/* Danger */
.drow{display:flex;gap:7px}
.db{flex:1;padding:11px;border-radius:9px;border:1.5px solid;font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;-webkit-appearance:none}
.de{border-color:#3a1515;color:#ff6b6b;background:#160808}.de:active{background:#2a1010}
.dr{border-color:#1a1a1a;color:#333;background:#161616}.dr:active{color:#fff;border-color:#2a2a2a}

/* ── MENU ── */
#mov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center}
#mov.open{display:flex}
#md{background:#0e0e0e;border-radius:20px;padding:6px;width:260px;border:1px solid #1a1a1a;max-height:88vh;overflow-y:auto}
.mi{display:flex;align-items:center;gap:11px;padding:13px 15px;border-radius:11px;cursor:pointer;background:transparent;border:none;width:100%;text-align:left;color:#fff;font-family:inherit;-webkit-appearance:none}
.mi:active{background:#161616}
.miico{font-size:18px;width:22px;text-align:center}
.mit{font-size:14px;font-weight:700;color:#fff}
.mis{font-size:9px;color:#2a2a2a;margin-top:1px}
.msep{height:1px;background:#161616;margin:4px 0}
.mi.danger .mit{color:#ff6b6b}

/* ── FIRST PLAYER OVERLAY ── */
#fp-overlay{position:fixed;inset:0;z-index:360;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#fp-overlay.show{display:flex;animation:fi .2s ease}
#fp-crown{font-size:72px;animation:fp-bounce .5s ease infinite alternate}
@keyframes fp-bounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-14px) scale(1.1)}}
#fp-name{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:4px;color:#fff;text-align:center;animation:fp-in .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes fp-in{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
#fp-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#333;margin-top:-8px}
#fp-close{padding:11px 28px;background:#fff;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:#111;cursor:pointer;-webkit-appearance:none}
#fp-close:active{background:#ddd}
#fp-spin{font-size:22px;animation:fp-spin .15s steps(1) infinite}
@keyframes fp-spin{0%{content:'⚀'}16%{content:'⚁'}33%{content:'⚂'}50%{content:'⚃'}66%{content:'⚄'}83%{content:'⚅'}}

/* ── COLOR PICKER ── */
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:8px}
.color-dot{width:38px;height:38px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;-webkit-appearance:none;background:var(--c)}
.color-dot.sel{border-color:#fff;transform:scale(1.15)}
.color-dot:active{transform:scale(.9)}

/* ── DICE RESULT ── */
#dice-overlay{position:fixed;inset:0;z-index:350;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#dice-overlay.show{display:flex;animation:fi .2s ease}
#dice-face{font-family:'Bebas Neue',sans-serif;font-size:96px;color:#fff;line-height:1;animation:die-in .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes die-in{from{transform:scale(.3) rotate(-30deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
#dice-label{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#444}
#dice-close{margin-top:8px;padding:10px 28px;background:#1a1a1a;border:1.5px solid #242424;border-radius:10px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;-webkit-appearance:none}
#dice-close:active{background:#222}

/* ── PRIORITY MODAL ── */
#pmod{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
#pmod.open{display:flex}
#pd{background:#0e0e0e;border-radius:18px;padding:20px;width:280px;border:1px solid #1a1a1a;text-align:center}
.pd-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#fff;margin-bottom:14px}
.pd-turn{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#fff;line-height:1;margin-bottom:4px}
.pd-turn-lbl{font-size:9px;font-weight:700;letter-spacing:2px;color:#333;text-transform:uppercase;margin-bottom:16px}
.pd-timer{font-family:'Bebas Neue',sans-serif;font-size:28px;color:rgba(255,255,255,.5);margin-bottom:16px}
.pd-players{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.pd-player{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.pd-player.active-turn{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.08)}
.pd-player:active{opacity:.7}
.pd-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pd-name{font-size:13px;font-weight:700;color:#fff;flex:1;text-align:left}
.pd-life{font-family:'Bebas Neue',sans-serif;font-size:18px;color:rgba(255,255,255,.5)}
.pd-next{width:100%;padding:13px;background:#fff;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#111;cursor:pointer;-webkit-appearance:none;margin-bottom:8px}
.pd-next:active{background:#ddd}
.pd-close{width:100%;padding:10px;background:transparent;border:1.5px solid #1a1a1a;border-radius:10px;color:#444;font-size:12px;cursor:pointer;-webkit-appearance:none;text-transform:uppercase;font-weight:700;letter-spacing:.5px}
.pd-close:active{border-color:#333;color:#fff}

/* ── MODAL ── */
#modal-ov{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center}
#modal-ov.open{display:flex}
#modal-d{background:#0e0e0e;border-radius:20px 20px 0 0;padding:18px 18px calc(var(--sb)+18px);width:100%;max-width:500px}
.mt{font-size:12px;font-weight:700;color:#fff;margin-bottom:12px;text-align:center;text-transform:uppercase;letter-spacing:.5px}
.minp{width:100%;background:#161616;border:1.5px solid #1a1a1a;border-radius:9px;padding:13px;font-size:16px;color:#fff;outline:none;-webkit-appearance:none;margin-bottom:11px}
.minp:focus{border-color:#242424}
.mbtns{display:flex;gap:7px}
.mok{flex:1;background:#fff;border:none;border-radius:9px;padding:13px;color:#111;font-weight:700;font-size:13px;cursor:pointer;-webkit-appearance:none}
.mok:active{background:#ddd}
.mcan{flex:1;background:#161616;border:1.5px solid #1a1a1a;border-radius:9px;padding:13px;color:#333;font-size:13px;cursor:pointer;-webkit-appearance:none}

/* ── VICTORY ── */
#vic{position:fixed;inset:0;z-index:500;background:#0a0a0a;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;padding-top:calc(var(--st)+30px);padding-bottom:calc(var(--sb)+30px)}
#vic.show{display:flex;animation:vf .44s ease}
@keyframes vf{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.vt{font-size:76px;margin-bottom:13px;animation:vb 1s ease infinite alternate}
@keyframes vb{from{transform:translateY(0)}to{transform:translateY(-13px)}}
.vl{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#2a2a2a;margin-bottom:6px}
.vn{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:4px;color:#fff;line-height:1;margin-bottom:10px}
.vr{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2a2a2a;border:1.5px solid #1a1a1a;border-radius:20px;padding:4px 14px;display:inline-block;margin-bottom:36px}
.vbtns{display:flex;flex-direction:column;gap:11px;width:100%;max-width:270px}
.vm{width:100%;padding:15px;background:#fff;border:none;border-radius:11px;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;color:#111;cursor:pointer;-webkit-appearance:none}
.vm:active{background:#ddd}
.vs{width:100%;padding:13px;background:transparent;border:1.5px solid #1a1a1a;border-radius:11px;font-size:12px;font-weight:700;color:#333;cursor:pointer;text-transform:uppercase;-webkit-appearance:none;letter-spacing:.5px}
.vs:active{border-color:#333;color:#fff}
.vc{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.cb2{position:absolute;border-radius:2px;animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.1}}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo">LILY</div>
  <div class="logo-s">Life Counter · Commander</div>
  <div class="ss"><div class="sl">Jugadores</div><div class="pcr" id="pcr"></div>
    <div class="lrow" id="lrow">
      <button class="lb" onclick="sLife(20,this)">20</button>
      <button class="lb sel" onclick="sLife(40,this)">40</button>
      <button class="lb" onclick="sLife(30,this)">30</button>
    </div>
  </div>
  <div class="ss"><div class="sl">Nombres</div><div class="nlist" id="nlist"></div></div>
  <button class="gobtn" onclick="startGame()">COMENZAR</button>
</div>

<!-- GAME -->
<div id="game">
  <div class="board" id="board"></div>
  <div id="hub">
    <div id="turn-pill" onclick="openPriority()">
      <span>TURNO</span><span id="turn-n">1</span>
      <span id="turn-timer">0:00</span>
    </div>
    <div id="hub-row">
      <button id="priority-btn" onclick="nextTurn()" title="Pasar turno">▶</button>
      <button id="mic-btn" onclick="toggleWake()">🎙</button>
      <button id="menu-btn" onclick="openMenu()"><div class="md"></div><div class="md"></div><div class="md"></div></button>
    </div>
  </div>
  <div id="vbar"><div id="vi"></div><div id="vh"></div><div id="va"></div><div id="ve"></div></div>
</div>

<!-- SHEET -->
<div id="sov" onclick="closeShBg(event)">
  <div id="sheet">
    <div class="sh"></div>
    <div class="shd"><span class="sht" id="sht">—</span><button class="shc" onclick="closeSh()">×</button></div>
    <div class="ssec"><div class="slbl">🎨 Color</div>
      <div class="color-grid" id="shcolor"></div>
    </div>
    <div class="ssec"><div class="slbl">❤ Vida</div>
      <div class="lc">
        <button class="lcb big m" onclick="shL(-10)">−10</button>
        <button class="lcb m" onclick="shL(-1)">−</button>
        <div class="lcn" id="shl">40</div>
        <button class="lcb" onclick="shL(1)">+</button>
        <button class="lcb big" onclick="shL(10)">+10</button>
      </div>
      <div class="lpre">
        <button class="lpb" onclick="shLs(40)">40</button>
        <button class="lpb" onclick="shLs(30)">30</button>
        <button class="lpb" onclick="shLs(20)">20</button>
        <button class="lpb" onclick="shLs(0)">0</button>
        <button class="lpb" style="color:#ff6b6b;border-color:#3a1515" onclick="shLs(-999)">💀</button>
      </div>
    </div>
    <div class="ssec"><div class="slbl">🔷 Pool de Maná</div>
      <div class="mrow">
        <div class="mn" id="shm">0</div>
        <div class="mbtns">
          <button class="mb mm" onclick="shM(-1)">−</button>
          <button class="mb" onclick="shM(1)">+1</button>
          <button class="mb" onclick="shM(2)">+2</button>
          <button class="mb" onclick="shM(5)">+5</button>
        </div>
        <button class="mclr" onclick="shMs(0)">CLEAR</button>
      </div>
    </div>
    <div class="ssec"><div class="slbl">Contadores</div><div class="crows" id="shc"></div></div>
    <div class="ssec"><div class="slbl">Personalizados</div>
      <div class="crows" id="shcu"></div>
      <div class="cadd"><input class="cinp" id="cinp" placeholder="Nombre del contador…" onkeydown="if(event.key==='Enter'){this.blur();addCu()}"/><button class="caddb" onclick="addCu()">＋ Crear</button></div>
    </div>
    <div class="ssec"><div class="slbl">Mecánicas</div><div class="sgrid" id="shst"></div></div>
    <div class="ssec"><div class="slbl">⚔ Daño de Comandante</div><div class="cmdrows" id="shcmd"></div></div>
    <div class="ssec"><div class="slbl">Acciones</div><div class="drow" id="shd"></div></div>
  </div>
</div>

<!-- MENU -->
<div id="mov" onclick="if(event.target===this)closeMenu()">
  <div id="md">
    <button class="mi" onclick="closeMenu();ga('monarch')"><span class="miico">♛</span><div><div class="mit">El Monarca</div><div class="mis">Asignar</div></div></button>
    <button class="mi" onclick="closeMenu();ga('initiative')"><span class="miico">⚔</span><div><div class="mit">La Iniciativa</div><div class="mis">+ La Ciudad auto</div></div></button>
    <button class="mi" onclick="closeMenu();cycleDN()"><span class="miico" id="dn-ico">☀</span><div><div class="mit">Día / Noche</div><div class="mis" id="dn-sub">Estado: neutral</div></div></button>
    <div class="msep"></div>
    <!-- DICE SECTION -->
    <div style="padding:8px 12px 4px"><div class="slbl" style="margin-bottom:8px">🎲 Tirar dado</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <button class="mi" style="border:1.5px solid #1a1a1a;border-radius:10px;padding:10px" onclick="closeMenu();rollDice(6)"><span class="miico">⚅</span><div><div class="mit">D6</div><div class="mis">1–6</div></div></button>
        <button class="mi" style="border:1.5px solid #1a1a1a;border-radius:10px;padding:10px" onclick="closeMenu();rollDice(10)"><span class="miico">🔟</span><div><div class="mit">D10</div><div class="mis">1–10</div></div></button>
        <button class="mi" style="border:1.5px solid #1a1a1a;border-radius:10px;padding:10px" onclick="closeMenu();rollDice(12)"><span class="miico">🎲</span><div><div class="mit">D12</div><div class="mis">1–12</div></div></button>
        <button class="mi" style="border:1.5px solid #1a1a1a;border-radius:10px;padding:10px" onclick="closeMenu();rollDice(20)"><span class="miico">⚔</span><div><div class="mit">D20</div><div class="mis">1–20</div></div></button>
      </div>
    </div>
    <div class="msep"></div>
    <button class="mi" onclick="closeMenu();pickFirstPlayer()"><span class="miico">🎲</span><div><div class="mit">Primer jugador</div><div class="mis">Elige random</div></div></button>
    <button class="mi" onclick="closeMenu();undoLast()"><span class="miico">↩</span><div><div class="mit">Deshacer</div><div class="mis">Última acción</div></div></button>

    <button class="mi danger" onclick="closeMenu();confirmReset()"><span class="miico">⟳</span><div><div class="mit">Reiniciar</div><div class="mis">Vuelve al menú</div></div></button>
  </div>
</div>

<!-- FIRST PLAYER OVERLAY -->
<div id="fp-overlay">
  <div id="fp-spin">🎲</div>
  <div id="fp-crown">🎲</div>
  <div id="fp-name">—</div>
  <div id="fp-label">PRIMER JUGADOR</div>
  <button id="fp-close" onclick="document.getElementById('fp-overlay').classList.remove('show')">JUGAR</button>
</div>

<!-- DICE OVERLAY -->

  <div id="dice-label">D20</div>
  <div id="dice-face">20</div>
  <button id="dice-close" onclick="document.getElementById('dice-overlay').classList.remove('show')">CERRAR</button>

<!-- PRIORITY MODAL -->
<div id="pmod" onclick="if(event.target===this)closePriority()">
  <div id="pd">

    <div class="pd-turn" id="pd-turn">1</div>
    <div class="pd-turn-lbl">Turno actual</div>
    <div class="pd-timer" id="pd-timer">0:00</div>
    <div class="pd-players" id="pd-players"></div>

<!-- MODAL -->
<div id="modal-ov" onclick="if(event.target===this)closeModal()">
  <div id="modal-d">
    <div class="mt" id="modal-t">Entrada</div>
    <input class="minp" id="minp" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <div class="mbtns"><button class="mcan" onclick="closeModal()">Cancelar</button><button class="mok" onclick="confirmModal()">OK</button></div>
  </div>
</div>

<!-- VICTORY -->
<div id="vic">
  <div class="vc" id="conf"></div>
  <div class="vt">🏆</div>
  <div class="vl">Ganador de la partida</div>
  <div class="vn" id="vn">—</div>
  <div class="vr" id="vr">VICTORIA</div>
  <div class="vbtns">
    <button class="vm" onclick="restartSame()">⟳ REVANCHA</button>
    <button class="vs" onclick="goSetup()">← Menú inicial</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//  WAKE WORDS — "Lily"
// ════════════════════════════════════════════════════
const WAKE=['lily','lili','lily,','lili,','lilí','lilly','lili,','lily.'];

// ════════════════════════════════════════════════════
//  PALETTE & DATA
// ════════════════════════════════════════════════════
const PAL=['#E63946','#F4A261','#2A9D8F','#457B9D','#8338EC','#06D6A0'];
const COLOR_OPTS=['#E63946','#F4A261','#2A9D8F','#457B9D','#8338EC','#06D6A0',
  '#FF6B6B','#FFD93D','#4ECDC4','#1A535C','#C77DFF','#FF9F1C',
  '#F72585','#48CAE4','#7B2D8B','#2DC653','#E9C46A','#264653'];
const CTRS=[
  {key:'poison',icon:'☠',label:'Veneno',  lethal:10, sub:'Letal a 10',alias:['veneno','poison','tóxico','toxico','envenenar']},
  {key:'exp',   icon:'✦',label:'Exp',     lethal:null,sub:'Sin límite',alias:['experiencia','experience','exp','xp','nivel','experiencia']},
  {key:'energy',icon:'⚡',label:'Energía',lethal:null,sub:'Sin límite',alias:['energía','energia','energy','energias','energías']},
  {key:'rad',   icon:'☢',label:'Rad',     lethal:10, sub:'Letal a 10',alias:['radiación','radiacion','rad','rads','radiacion']},
  {key:'lore',  icon:'📖',label:'Lore',   lethal:null,sub:'Sin límite',alias:['lore','relato','lores']},
  {key:'charge',icon:'◈',label:'Carga',   lethal:null,sub:'Sin límite',alias:['carga','charge','cargas','charges']},
];
const STSTATES=[
  {key:'monarch',  icon:'♛',label:'Monarca',   sub:'El Monarca'},
  {key:'initiative',icon:'⚔',label:'Iniciativa',sub:'+ La Ciudad'},
  {key:'city',     icon:'🏰',label:'La Ciudad', sub:'Iniciativa'},
  {key:'ring',     icon:'💍',label:'El Anillo', sub:''},
  {key:'emblem',   icon:'🌟',label:'Emblema',   sub:'Planeswalker',isC:true},
];

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let pCnt=4,iLife=40,players=[],hist=[],monI=-1,iniI=-1,dn='none';
let shI=-1,mCb=null,recog=null,wOn=false,wSt='off';
// Turn tracker
let turnNum=1,activeTurn=0,turnStart=Date.now(),turnTimerInterval=null;
let priorityOpen=false;

// ════════════════════════════════════════════════════
//  SETUP
// ════════════════════════════════════════════════════
function buildSetup(){
  const r=document.getElementById('pcr');r.innerHTML='';
  [2,3,4].forEach(n=>{
    const b=document.createElement('button');
    b.className='pcb'+(n===pCnt?' sel':'');b.textContent=n;
    b.onclick=()=>{pCnt=n;r.querySelectorAll('.pcb').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');buildNames();};
    r.appendChild(b);
  });
  buildNames();
}
function sLife(v,btn){iLife=v;document.querySelectorAll('.lb').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
function buildNames(){
  const c=document.getElementById('nlist');c.innerHTML='';
  ['Jugador 1','Jugador 2','Jugador 3','Jugador 4'].slice(0,pCnt).forEach((d,i)=>{
    const row=document.createElement('div');row.className='nr';
    const pill=document.createElement('div');pill.className='npill';pill.style.background=PAL[i];
    const inp=document.createElement('input');inp.className='ninp';inp.placeholder=d;inp.id='ni'+i;
    inp.setAttribute('autocapitalize','words');inp.setAttribute('autocorrect','off');inp.setAttribute('spellcheck','false');
    row.appendChild(pill);row.appendChild(inp);c.appendChild(row);
  });
}
function startGame(){
  const names=[];
  for(let i=0;i<pCnt;i++){const v=(document.getElementById('ni'+i)||{}).value||'';names.push(v.trim()||'J'+(i+1));}
  initPlayers(names);
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';
  // Init turn tracker
  turnNum=1;activeTurn=0;turnStart=Date.now();
  startTurnTimer();
  render();
  // Swipe horizontal en el board = pasar turno
  setupBoardSwipe();
  // Init voice AFTER DOM ready — fixes iOS race condition
  setTimeout(initVoice, 150);
  sv('','','Di  "Lily, [comando]"  •  Toca un cuadrante para editar','');
  setTimeout(hv,2000);
}
function initPlayers(names){
  players=names.map((name,i)=>({
    name,life:iLife,dead:false,color:PAL[i],mana:0,
    counters:Object.fromEntries(CTRS.map(c=>[c.key,0])),
    custom:{},cmdDmg:{},state:{city:false,ring:false,emblem:0},
  }));
  hist=[];monI=-1;iniI=-1;dn='none';
}
function goSetup(){hideV();document.getElementById('game').style.display='none';document.getElementById('setup').style.display='flex';stopTurnTimer();if(wOn){wOn=false;try{recog&&recog.stop();}catch(e){}}}
function restartSame(){hideV();const n=players.map(p=>p.name);initPlayers(n);turnNum=1;activeTurn=0;turnStart=Date.now();render();}
function confirmReset(){if(confirm('¿Reiniciar la partida?')){const n=players.map(p=>p.name);initPlayers(n);turnNum=1;activeTurn=0;turnStart=Date.now();closeMenu();render();}}

// ════════════════════════════════════════════════════
//  TURN TRACKER
// ════════════════════════════════════════════════════
function startTurnTimer(){
  stopTurnTimer();
  turnTimerInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-turnStart)/1000);
    const m=Math.floor(elapsed/60);const s=elapsed%60;
    const str=m+':'+(s<10?'0':'')+s;
    const pill=document.getElementById('turn-timer');if(pill)pill.textContent=str;
    const pt=document.getElementById('pd-timer');if(pt)pt.textContent=str;
  },1000);
}
function stopTurnTimer(){if(turnTimerInterval){clearInterval(turnTimerInterval);turnTimerInterval=null;}}

function nextTurn(){
  // Advance to next living player
  let next=activeTurn;
  for(let i=0;i<players.length;i++){
    next=(next+1)%players.length;
    if(!players[next].dead)break;
  }
  if(next!==activeTurn||(players[activeTurn]&&players[activeTurn].dead)){
    if(next<=activeTurn||activeTurn===players.length-1)turnNum++;
    activeTurn=next;
  } else {
    turnNum++;
  }
  turnStart=Date.now();

function rollDice(sides){
  const result=Math.floor(Math.random()*sides)+1;
  const faces={1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'};
  const special={20:result===20?'⭐':result===1?'💀':null};
  document.getElementById('dice-label').textContent='D'+sides+' — Tirando…';
  document.getElementById('dice-face').textContent='🎲';
  document.getElementById('dice-overlay').classList.add('show');
  // Animate
  let rolls=0;const maxRolls=12;
  const interval=setInterval(()=>{
    rolls++;
    const r2=Math.floor(Math.random()*sides)+1;
    document.getElementById('dice-face').textContent=sides===6?(faces[r2]||r2):r2;
    if(rolls>=maxRolls){
      clearInterval(interval);
      document.getElementById('dice-label').textContent='D'+sides+(sides===20&&result===20?' — ¡CRÍTICO!':sides===20&&result===1?' — PIFIA':'');
      const display=sides===6?(faces[result]||result):result;
      document.getElementById('dice-face').textContent=display+(result===20&&sides===20?' ⭐':result===1&&sides===20?' 💀':'');
    }
  },80);
  sv('','','🎲 D'+sides+': '+result+(result===sides?' — ¡Máximo!':result===1?' — ¡Mínimo!':''),'');
}

// Voice command for dice
function rollDiceVoice(sides){
  rollDice(sides);
}

function undoLast(){if(!hist.length){sv('','','Sin acciones para deshacer.','');return;}const s=hist.pop();players=s.players;monI=s.monI;iniI=s.iniI;dn=s.dn;render();if(shI>=0)rsh();sv('','','↩ Deshecho.','');}

function render(){
  const b=document.getElementById('board');
  b.className='board p'+players.length;b.innerHTML='';
  players.forEach((p,i)=>b.appendChild(buildQ(p,i)));
  updDN();

  const tn=document.getElementById('turn-n');if(tn)tn.textContent=turnNum;

function lc(v,dead){if(dead||v<=0)return 'dead-c';if(v<=9)return 'low';if(v<=20)return 'warn';return '';}
function buildQ(p,i){
  const q=document.createElement('div');
  q.className='quad'+(p.dead?' dead':'');q.id='q'+i;q.style.background=p.color;
  // Tap mitad superior = +1, mitad inferior = -1, tap largo = sheet
  let _tapTimer=null, _tapMoved=false;
  // Overlay invisible para garantizar captura de touch en toda el área
  const _overlay=document.createElement('div');
  _overlay.style.cssText='position:absolute;inset:0;z-index:2;touch-action:manipulation';
  q.appendChild(_overlay);
  _overlay.addEventListener('touchstart', e=>{
    _tapMoved=false;
    _tapTimer=setTimeout(()=>{ _tapTimer=null; openSheet(i); }, 500);
  }, {passive:true});
  _overlay.addEventListener('touchmove', ()=>{ _tapMoved=true; if(_tapTimer){clearTimeout(_tapTimer);_tapTimer=null;} }, {passive:true});
  _overlay.addEventListener('touchend', e=>{
    if(_tapMoved){ if(_tapTimer){clearTimeout(_tapTimer);_tapTimer=null;} return; }
    if(_tapTimer===null) return;
    clearTimeout(_tapTimer); _tapTimer=null;
    if(players[i].dead) return;
    const touch = e.changedTouches[0];
    const rect = q.getBoundingClientRect();
    const relY = touch.clientY - rect.top;
    const rotated = q.dataset.rotated === '1';
    const upper = rotated ? (relY >= rect.height / 2) : (relY < rect.height / 2);
    snap();
    if(upper){ players[i].life+=1; } else { players[i].life-=1; }
    chkDeaths(); render();
    flashQ(i);
    sv('','', (upper?'+1 ':'-1 ') + players[i].name + ' → ' + players[i].life, '');
  }, {passive:true});
  // Desktop fallback
  q.addEventListener('click', e=>{
    if(players[i].dead) return;
    const rect = q.getBoundingClientRect();
    const relY = e.clientY - rect.top;
    const rotated = q.dataset.rotated === '1';
    const upper = rotated ? (relY >= rect.height / 2) : (relY < rect.height / 2);
    snap();
    if(upper){ players[i].life+=1; } else { players[i].life-=1; }
    chkDeaths(); render();
    flashQ(i);
    sv('','', (upper?'+1 ':'-1 ') + players[i].name + ' → ' + players[i].life, '');
  });
  const qi=document.createElement('div');qi.className='qi';
  // Mark rotated quads so tap logic can invert
  const isRotated=(players.length===4&&(i===0||i===1))||(players.length===3&&(i===0||i===1))||(players.length===2&&i===0);
  if(isRotated) q.dataset.rotated='1';

  // Active turn indicator
  if(i===activeTurn&&!p.dead){
    const tb=document.createElement('div');tb.className='qturn';
    tb.innerHTML='<div class="qturn-badge">TURNO '+(turnNum)+'</div>';
    q.appendChild(tb);
  }

  const ln=document.createElement('div');ln.className='ql '+lc(p.life,p.dead);ln.textContent=p.dead?'💀':p.life;qi.appendChild(ln);
  const nm=document.createElement('div');nm.className='qn';nm.textContent=p.name;qi.appendChild(nm);

  // Chips strip
  const ch=document.createElement('div');ch.className='qch';
  CTRS.forEach(def=>{const v=p.counters[def.key]||0;if(!v)return;const c=document.createElement('div');c.className='chip'+(def.lethal&&v>=def.lethal?' hot':'');c.textContent=def.icon+' '+v;ch.appendChild(c);});
  if(i===monI){const c=document.createElement('div');c.className='chip';c.textContent='♛';ch.appendChild(c);}
  if(i===iniI){const c=document.createElement('div');c.className='chip';c.textContent='⚔';ch.appendChild(c);}
  if(p.state.ring){const c=document.createElement('div');c.className='chip';c.textContent='💍';ch.appendChild(c);}
  if(p.state.emblem>0){const c=document.createElement('div');c.className='chip';c.textContent='🌟 '+p.state.emblem;ch.appendChild(c);}
  if(p.state.city){const c=document.createElement('div');c.className='chip';c.textContent='🏰';ch.appendChild(c);}
  if(dn==='day'){const c=document.createElement('div');c.className='chip';c.textContent='☀';ch.appendChild(c);}
  if(dn==='night'){const c=document.createElement('div');c.className='chip';c.textContent='🌙';ch.appendChild(c);}
  Object.entries(p.custom).forEach(([k,v])=>{if(!v)return;const c=document.createElement('div');c.className='chip';c.textContent='◆ '+v;ch.appendChild(c);});
  qi.appendChild(ch);

  // Mana badge
  if(p.mana>0){const mn=document.createElement('div');mn.className='qmana';mn.innerHTML='<div class="qmana-i">🔷 <span class="qmana-n">'+p.mana+'</span></div>';q.appendChild(mn);}

  const dl=document.createElement('div');dl.className='qdead';dl.textContent='ELIMINADO';q.appendChild(dl);
  q.appendChild(qi);
  return q;
}

function rsh(){
  if(shI<0)return;const p=players[shI];
  document.getElementById('sht').textContent=p.name.toUpperCase();
  document.getElementById('shl').textContent=p.life;
  document.getElementById('shm').textContent=p.mana||0;
  // Counters
  const cc=document.getElementById('shc');cc.innerHTML='';
  CTRS.forEach(def=>{
    const v=p.counters[def.key]||0;const il=def.lethal&&v>=def.lethal;

    cc.appendChild(row);
  });
  // Custom
  const cu=document.getElementById('shcu');cu.innerHTML='';
  Object.entries(p.custom).forEach(([k,v])=>{
    const row=document.createElement('div');row.className='crow';
    row.innerHTML='<span class="cico">◆</span><div class="ci"><div class="cn">'+k+'</div><div class="cs">Personalizado</div></div><div class="cbtns"><button class="cb m" onclick="shCus(\''+k+'\',-1)">−</button><span class="cv">'+v+'</span><button class="cb p" onclick="shCus(\''+k+'\',1)">+</button></div>';
    cu.appendChild(row);
  });
  // States
  const sg=document.getElementById('shst');sg.innerHTML='';
  STSTATES.forEach(st=>{
    const isM=st.key==='monarch'&&monI===shI;const isIn=st.key==='initiative'&&iniI===shI;
    const val=st.isC?p.state[st.key]:st.key==='monarch'?isM:st.key==='initiative'?isIn:p.state[st.key];
    const active=st.isC?val>0:val;
    const btn=document.createElement('button');btn.className='stg'+(active?' on':'');
    btn.innerHTML='<span class="sti">'+st.icon+'</span><div class="stt">'+st.label+(st.isC&&val>0?' ('+val+')':'')+'<br><span style="font-size:9px;color:#2a2a2a">'+st.sub+'</span></div>';
    btn.onclick=()=>shState(st.key);sg.appendChild(btn);
  });
  // CMD
  const cmd=document.getElementById('shcmd');cmd.innerHTML='';
  players.forEach((op,j)=>{
    if(j===shI)return;const dmg=p.cmdDmg[op.name]||0;const pct=Math.min(100,(dmg/21)*100);const let2=dmg>=21;
    const row=document.createElement('div');row.className='cmdr';
    row.innerHTML='<span class="cmdf">De '+op.name+'</span><div class="cmdbw"><div class="cmdbar" style="width:'+pct+'%;'+(let2?'background:#ff6b6b':'')+'"></div></div><span class="cmdn">'+dmg+'/21</span><div class="cmdbs"><button class="cmdb m" onclick="shCmd(\''+op.name+'\',-1)">−</button><button class="cmdb" onclick="shCmd(\''+op.name+'\',1)">+</button></div>';
    cmd.appendChild(row);
  });
  // Color picker
  const cg=document.getElementById('shcolor');if(cg){cg.innerHTML='';
    COLOR_OPTS.forEach(col=>{
      const d=document.createElement('button');d.className='color-dot'+(p.color===col?' sel':'');
      d.style.setProperty('--c',col);d.style.background=col;
      d.onclick=()=>{snap();players[shI].color=col;render();rsh();};
      cg.appendChild(d);
    });
  }
  // Danger
  const dr=document.getElementById('shd');dr.innerHTML='';
  const btn=document.createElement('button');
  if(!p.dead){btn.className='db de';btn.textContent='💀 Eliminar';btn.onclick=()=>{snap();p.dead=true;chkDeaths();render();closeSh();};}
  else{btn.className='db dr';btn.textContent='♻ Restaurar';btn.onclick=()=>{snap();p.dead=false;render();closeSh();};}
  dr.appendChild(btn);
}
function shL(d){if(shI<0)return;snap();players[shI].life+=d;chkDeaths();render();rsh();}
function shLs(v){if(shI<0)return;snap();if(v===-999){players[shI].dead=true;players[shI].life=0;chkDeaths();render();closeSh();return;}players[shI].life=v;chkDeaths();render();rsh();}
function shM(d){if(shI<0)return;snap();players[shI].mana=Math.max(0,(players[shI].mana||0)+d);render();rsh();showManaToast(shI,d,false);}
function shMs(v){if(shI<0)return;snap();players[shI].mana=v;render();rsh();showManaToast(shI,v,true);}
function shCtr(k,d){if(shI<0)return;snap();players[shI].counters[k]=Math.max(0,(players[shI].counters[k]||0)+d);chkDeaths();render();rsh();}
function shCus(k,d){if(shI<0)return;snap();players[shI].custom[k]=Math.max(0,(players[shI].custom[k]||0)+d);render();rsh();}
function addCu(){const inp=document.getElementById('cinp');const n=inp.value.trim();if(!n||shI<0)return;snap();players[shI].custom[n]=0;inp.value='';render();rsh();}
function shState(key){
  if(shI<0)return;snap();
  if(key==='monarch'){monI=monI===shI?-1:shI;}
  else if(key==='initiative'){iniI=iniI===shI?-1:shI;if(iniI===shI)players[shI].state.city=true;}
  else if(key==='emblem'){players[shI].state.emblem++;}
  else{players[shI].state[key]=!players[shI].state[key];}
  render();rsh();
}
function shCmd(fromName,d){
  if(shI<0)return;snap();
  if(!players[shI].cmdDmg[fromName])players[shI].cmdDmg[fromName]=0;
  players[shI].cmdDmg[fromName]=Math.max(0,players[shI].cmdDmg[fromName]+d);
  if(d>0){players[shI].life-=d;}
  if(players[shI].cmdDmg[fromName]>=21&&!players[shI].dead){players[shI].dead=true;chkWinner();}
  chkDeaths();render();rsh();
}

function findP(q){if(!q)return -1;const s=q.toLowerCase().trim();let best=-1,score=0;players.forEach((p,i)=>{const n=p.name.toLowerCase();if(n===s&&score<4){best=i;score=4;}else if(n.startsWith(s)&&score<3){best=i;score=3;}else if(n.includes(s)&&score<2){best=i;score=2;}else if(s.includes(n)&&n.length>1&&score<1){best=i;score=1;}});return best;}
function toN(s){const m={un:1,uno:1,una:1,dos:2,tres:3,cuatro:4,cinco:5,seis:6,siete:7,ocho:8,nueve:9,diez:10,once:11,doce:12,quince:15,veinte:20,veinticinco:25,treinta:30,cuarenta:40,cincuenta:50};const t=(s||'').toLowerCase().trim();return m[t]||(isNaN(parseInt(t))?null:parseInt(t));}
function resC(w){const wd=(w||'').toLowerCase();for(const d of CTRS){if(d.alias.some(a=>wd.includes(a)))return d.key;}return null;}
function findFirst(){return players.findIndex(p=>!p.dead);}

function showManaToast(pi, delta, isSet){
  const q = document.getElementById('q'+pi);
  if(!q) return;
  // Remover toasts anteriores del mismo quad
  q.querySelectorAll('.mana-toast').forEach(t=>t.remove());
  const toast = document.createElement('div');
  // Texto: "+3 🔷", "-2 🔷", "= 5 🔷"
  if(isSet){
    toast.className = 'mana-toast set';
    toast.textContent = '= ' + delta + ' 🔷';
  } else {
    toast.className = 'mana-toast' + (delta < 0 ? ' neg' : '');
    toast.textContent = (delta > 0 ? '+' : '') + delta + ' 🔷';
  }
  q.appendChild(toast);
  // Auto-remove after animation
  setTimeout(()=>toast.remove(), 1500);
}

//  COMMAND PARSER — FULL v4
//  Mecánicas completas, mana con color, vida, contadores
// ════════════════════════════════════════════════════
function parseCmd(raw){
  const tl=raw.toLowerCase().trim();
  const wf=WAKE.find(w=>tl.startsWith(w));
  const c=wf?tl.substring(wf.length).replace(/^[,\.\s]+/,''):tl;
  const heard=wf?'<span class="ww">'+raw.substring(0,wf.length)+'</span> '+raw.substring(wf.length):raw;
  sv('',heard,'','');

  // VICTORIA
  let wm=c.match(/(\w+)\s+gan[oó]\s+(?:el\s+)?(?:juego|partida)/)||c.match(/(\w+)\s+gana\s+(?:la\s+)?partida/)||c.match(/(\w+)\s+gana\s+(?:el\s+)?juego/)||c.match(/(\w+)\s+ha\s+ganado/)||c.match(/ganador\s+(?:es\s+)?(\w+)/)||c.match(/victoria\s+(?:de\s+|para\s+)?(\w+)/);
  if(wm){const i=findP(wm[1]);if(i>=0){declareWinner(players[i].name,'VICTORIA');sv('',heard,'🏆 '+players[i].name,'');return;}}

  // ELIMINAR
  let lm=c.match(/(\w+)\s+(?:perdió|perdio|pierde)\s+(?:el\s+)?juego/)||c.match(/(\w+)\s+concede/)||c.match(/eliminar?\s+a?\s*(\w+)/)||c.match(/(\w+)\s+(?:fue\s+)?eliminad/);
  if(lm){const i=findP(lm[1]);if(i>=0){snap();players[i].dead=true;chkDeaths();render();sv('',heard,players[i].name+' eliminado.','');return;}}

  // CONTROL
  if(/nueva partida|reiniciar/.test(c)){confirmReset();return;}
  // Apagar micrófono por voz
  if(/apaga(?:r)?\s+(?:el\s+)?mic|desactiva(?:r)?\s+(?:el\s+)?mic|silencia(?:r)?\s+(?:el\s+)?mic|para\s+(?:de\s+)?escuchar|detén\s+(?:el\s+)?mic|stop\s+mic|mic\s+(?:apagado|off)/.test(c)){if(wOn)toggleWake();sv('',heard,'🎙 Micrófono apagado.','');return;}
  if(/deshacer|undo/.test(c)){undoLast();return;}
  if(/transici[oó]n|d[ií]a.noche|noche.d[ií]a/.test(c)){cycleDN();sv('',heard,'Día/Noche → '+dn,'');return;}
  if(/c[oó]mo va|como va|estado|cu[aá]ntas vidas/.test(c)){const st=players.filter(p=>!p.dead).map(p=>p.name+': '+p.life).join(' · ');sv('',heard,st,'');return;}

  // TURNO
  if(/pasar turno|siguiente turno|pasa(?:r)?\s+(?:la\s+)?prioridad|paso\s+(?:la\s+)?prioridad|siguiente|next turn|es mi turno|mi turno|turno siguiente|próximo jugador|proximo jugador/.test(c)){nextTurn();return;}

  // ══ TODOS LOS JUGADORES ══
  // "todos pierden 5 vidas", "todos ganan veneno", "todos reciben 3 de daño"
  // "todos pierden X", "todos X", "todos los jugadores pierden X"
  let todosM = c.match(/todos\s+(?:los\s+jugadores?\s+)?(?:pierden|reciben|sufren|toman)\s+(\w+)\s+(?:de\s+)?(.+)/) ||
               c.match(/todos\s+(?:los\s+jugadores?\s+)?(?:pierden|reciben|sufren)\s+(\w+)$/) ||
               c.match(/(?:da[nñ]a(?:r)?|quita(?:r)?|resta(?:r)?)\s+(\w+)\s+(?:de\s+)?(.+?)\s+a\s+todos/) ||
               c.match(/(?:da[nñ]a(?:r)?|quita(?:r)?|resta(?:r)?)\s+(\w+)\s+a\s+todos/);
  if(todosM){
    const n=toN(todosM[1]);const what=(todosM[2]||'vidas').trim();
    if(n!==null){
      const ck=resC(what);const isLife=/vida|vidas|da[nñ]o|punto/.test(what)||!ck;
      snap();
      players.forEach((p,pi)=>{
        if(p.dead) return;
        if(ck){p.counters[ck]=Math.max(0,(p.counters[ck]||0)-n);}
        else if(isLife){p.life-=n;}
      });
      chkDeaths();render();
      const def=ck?CTRS.find(x=>x.key===ck):null;
      sv('',heard,'Todos -'+n+(def?' '+def.label:' vidas'),'');return;
    }
  }
  let todosGainM = c.match(/todos\s+(?:los\s+jugadores?\s+)?(?:ganan|obtienen|reciben|suman)\s+(\w+)\s+(?:de\s+)?(.+)/) ||
                   c.match(/todos\s+(?:los\s+jugadores?\s+)?ganan\s+(\w+)$/) ||
                   c.match(/dale\s+(\w+)\s+(?:de\s+)?(.+?)\s+a\s+todos/) ||
                   c.match(/dale\s+(\w+)\s+a\s+todos/);
  if(todosGainM){
    const n=toN(todosGainM[1]);const what=(todosGainM[2]||'vidas').trim();
    if(n!==null){
      const ck=resC(what);const isLife=/vida|vidas/.test(what)||!ck;
      snap();
      players.forEach((p,pi)=>{
        if(p.dead) return;
        if(ck){p.counters[ck]=(p.counters[ck]||0)+n;}
        else if(isLife){p.life+=n;}
      });
      chkDeaths();render();
      const def=ck?CTRS.find(x=>x.key===ck):null;
      sv('',heard,'Todos +'+n+(def?' '+def.label:' vidas'),'');return;
    }
  }
  // "todos veneno" / "todos +veneno" / "todos un veneno"
  let todosCtrM = c.match(/todos\s+(?:un\s+|una?\s+)?(\w+)/) ;
  if(todosCtrM && todosCtrM[1] !== 'los' && todosCtrM[1] !== 'pierden'){
    const ck=resC(todosCtrM[1]);
    if(ck){snap();players.forEach(p=>{if(!p.dead)p.counters[ck]=(p.counters[ck]||0)+1;});chkDeaths();render();const def=CTRS.find(x=>x.key===ck);sv('',heard,'Todos +1 '+def.label,'');return;}
  }

  // DADOS
  let dm=c.match(/(?:tira(?:r)?|lanza(?:r)?|rueda|roll|d[ée]me?)\s+(?:un\s+)?(?:dado\s+)?d?(\d+)/)||c.match(/dado\s+(?:de\s+)?(\d+)/)||c.match(/\bd(\d+)\b/);
  if(dm){const sides=[4,6,8,10,12,20,100];const sd=parseInt(dm[1]);if(sides.includes(sd)){rollDice(sd);sv('',heard,'🎲 Tirando D'+sd+'...','');return;}}

  // ══ MANA POOL ══
  // SET: "tengo N mana [color]", "pon N mana"
  let manaSet=c.match(/tengo\s+(\w+)\s+(?:de\s+)?man[aá]/)||
               c.match(/pon(?:me|le)?\s+(\w+)\s+(?:de\s+)?man[aá]/)||
               c.match(/(\w+)\s+man[aá]s?\s+en\s+(?:el|mi|su)\s+pool/)||
               c.match(/pool\s+(?:de\s+)?man[aá]\s+(?:es\s+)?(\w+)/);
  if(manaSet){const n=toN(manaSet[1]);if(n!==null){
    const tm=c.match(/\s+(?:de|para|a)\s+(\w+)$/);
    const pi=tm?findP(tm[1]):findFirst();
    if(pi>=0){snap();players[pi].mana=n;render();if(shI===pi)rsh();showManaToast(pi,n,true);sv('',heard,players[pi].name+' — Pool maná: '+n,'');return;}
  }}

  // GAIN: "[nombre] tiene/gana/agrega/acumula N mana(s) [color]"
  // "Gabo tiene 3 mana rojo en el pool" / "Alex acumula 2 manas genéricos"
  let manaGain=c.match(/(\w+)\s+(?:tiene|gana|agrega|acumula|suma|a[nñ]ade|pone|consigue)\s+(\w+)\s+(?:de\s+)?man[aá]/)||
                c.match(/(\w+)\s+(?:agrega|pone|a[nñ]ade)\s+(\w+)\s+(?:de\s+)?(?:man[aá]\s+)?(?:roj[oa]|azul|verde|negr[oa]|blanc[oa]|gen[eé]ric[oa]|incolor[oa])/);
  if(manaGain){const pi=findP(manaGain[1]);const n=toN(manaGain[2]);
    if(pi>=0&&n!==null){snap();players[pi].mana=(players[pi].mana||0)+n;render();if(shI===pi)rsh();showManaToast(pi,n,false);sv('',heard,players[pi].name+' +'+n+' maná — Pool: '+players[pi].mana,'');return;}
  }

  // USE: "gasto/uso N mana", "[nombre] gasta N mana"
  let manaUse=c.match(/(?:gasto|uso|quito|resto|consumo)\s+(\w+)\s+(?:de\s+|man[aá]s?\s+)?man[aá]?/);
  if(manaUse&&c.includes('man')){const n=toN(manaUse[1]);if(n!==null){const pi=findFirst();if(pi>=0){snap();players[pi].mana=Math.max(0,(players[pi].mana||0)-n);render();if(shI===pi)rsh();showManaToast(pi,-n,false);sv('',heard,players[pi].name+' -'+n+' maná — Pool: '+players[pi].mana,'');return;}}}
  let manaUse2=c.match(/(\w+)\s+(?:gasta|usa|consume)\s+(\w+)\s+(?:de\s+)?man[aá]/);
  if(manaUse2){const pi=findP(manaUse2[1]);const n=toN(manaUse2[2]);if(pi>=0&&n!==null){snap();players[pi].mana=Math.max(0,(players[pi].mana||0)-n);render();if(shI===pi)rsh();showManaToast(pi,-n,false);sv('',heard,players[pi].name+' -'+n+' maná — Pool: '+players[pi].mana,'');return;}}

  // CLEAR pool
  if(/vac[íi][ao]\s+(?:(?:su|mi|el|todo\s+el)\s+)?(?:pool|man[aá])|clear\s+man[aá]|mana\s+cero|sin\s+man[aá]/.test(c)){
    const nm2=c.match(/(\w+)\s+vac[íi][ao]/);
    const pi=nm2?findP(nm2[1]):findFirst();
    if(pi>=0){snap();players[pi].mana=0;render();if(shI===pi)rsh();showManaToast(pi,0,true);sv('',heard,players[pi].name+' — Pool vaciado.','');return;}
  }

  // ══ MECÁNICAS ══

  // EL MONARCA — todas las formas
  let mm=c.match(/(?:el\s+)?monarca\s+es\s+(\w+)/)||
          c.match(/(\w+)\s+agarro\s+(?:la\s+)?corona/)||
          c.match(/(\w+)\s+rob[oó]\s+(?:la\s+)?corona/)||
          c.match(/(\w+)\s+es\s+(?:el\s+)?monarca/)||
          c.match(/corona(?:r)?\s+a\s+(\w+)/)||
          c.match(/(\w+)\s+se\s+convierte\s+en\s+(?:el\s+)?monarca/)||
          c.match(/(\w+)\s+(?:tiene|gana)\s+(?:la\s+)?corona/)||
          c.match(/monarca\s+(\w+)/);
  if(mm){const i=findP(mm[1]);if(i>=0){snap();monI=i;render();sv('',heard,'♛ '+players[i].name+' — El Monarca','');return;}}

  // LA INICIATIVA — todas las formas
  let im=c.match(/(\w+)\s+(?:toma|agarra|tiene|gana)\s+(?:la\s+)?iniciativa/)||
          c.match(/iniciativa\s+(?:a\s+|para\s+|es\s+de\s+|de\s+)?(\w+)/)||
          c.match(/(?:la\s+)?iniciativa\s+(?:la\s+)?(?:tiene|toma|gana)\s+(\w+)/)||
          c.match(/(\w+)\s+se\s+lleva\s+(?:la\s+)?iniciativa/);
  if(im){const i=findP(im[1]);if(i>=0){snap();iniI=i;players[i].state.city=true;render();sv('',heard,'⚔ '+players[i].name+' — Iniciativa','');return;}}

  // EL ANILLO — todas las formas
  let rm=c.match(/(\w+)\s+(?:lleva|tiene|gana|carga|porta|usa)\s+(?:el\s+)?anillo/)||
          c.match(/anillo\s+(?:es\s+de\s+|lo\s+tiene\s+)?(\w+)/)||
          c.match(/(\w+)\s+es\s+(?:el\s+)?portador/);
  if(rm){const i=findP(rm[1]);if(i>=0){snap();players[i].state.ring=true;render();sv('',heard,'💍 '+players[i].name+' — El Anillo','');return;}}

  // EMBLEMA
  let em=c.match(/(\w+)\s+gana\s+(\w+)\s+emblema/)||
          c.match(/(\w+)\s+gana\s+(?:un\s+|uno\s+)?emblema/)||
          c.match(/emblema\s+(?:para\s+|a\s+)?(\w+)/)||
          c.match(/(\w+)\s+obtiene\s+(?:un\s+)?emblema/);
  if(em){const i=findP(em[1]);if(i>=0){snap();const n=toN(em[2])||1;players[i].state.emblem+=n;render();sv('',heard,'🌟 '+players[i].name+' +'+n+' emblema','');return;}}

  // LA CIUDAD
  let cityM=c.match(/(\w+)\s+(?:tiene|toma|gana|agarra)\s+(?:la\s+)?ciudad/)||c.match(/ciudad\s+(?:a\s+|para\s+)?(\w+)/);
  if(cityM){const i=findP(cityM[1]);if(i>=0){snap();players[i].state.city=true;render();sv('',heard,'🏰 '+players[i].name+' — La Ciudad','');return;}}

  // COMANDANTE
  let cd1=c.match(/(\w+)\s+(?:me\s+)?hace\s+(\w+)\s+(?:de\s+)?(?:da[nñ]o\s+de\s+)?comandante/);
  if(cd1){const n=toN(cd1[2]);if(n!==null){const si=findFirst();if(si>=0){snap();if(!players[si].cmdDmg[cd1[1]])players[si].cmdDmg[cd1[1]]=0;players[si].cmdDmg[cd1[1]]+=n;players[si].life-=n;if(players[si].cmdDmg[cd1[1]]>=21){players[si].dead=true;chkWinner();}chkDeaths();render();sv('',heard,'⚔ '+cd1[1]+' → '+n+' cmd','');return;}}}
  let cd2=c.match(/(\w+)\s+hace\s+(\w+)\s+(?:de\s+)?(?:da[nñ]o\s+de\s+)?comandante\s+a\s+(\w+)/);
  if(cd2){const n=toN(cd2[2]);const ti=findP(cd2[3]);if(n!==null&&ti>=0){snap();if(!players[ti].cmdDmg[cd2[1]])players[ti].cmdDmg[cd2[1]]=0;players[ti].cmdDmg[cd2[1]]+=n;players[ti].life-=n;if(players[ti].cmdDmg[cd2[1]]>=21){players[ti].dead=true;chkWinner();}chkDeaths();render();sv('',heard,'⚔ '+cd2[1]+' → '+n+' cmd → '+players[ti].name,'');return;}}

  // CONTADOR NUEVO
  let ccN=c.match(/(?:pon(?:me)?|crea(?:r)?|agrega(?:r)?|a[nñ]ade?)\s+(?:un\s+)?contador\s+de\s+(.+)/);
  if(ccN){const cname=ccN[1].trim();const bk=resC(cname);const si=findFirst();snap();if(bk){players[si].counters[bk]++;chkDeaths();}else{players[si].custom[cname]=(players[si].custom[cname]||0)+1;}render();sv('',heard,'+1 '+cname+' → '+players[si].name,'');return;}

  // ══ VIDA + CONTADORES ══

  // A: nombre + verbo_ganar + N + tipo
  let pA=c.match(/(\w+)\s+(?:gana|obtiene|recibe|agrega|acumula|suma|consigue|recupera|sana)\s+(\w+)\s+(?:de\s+)?(.+)/);
  if(pA){const pi=findP(pA[1]);const n=toN(pA[2]);const what=pA[3].trim();
    if(pi>=0&&n!==null){
      const ck=resC(what);
      if(ck){snap();players[pi].counters[ck]=(players[pi].counters[ck]||0)+n;const def=CTRS.find(x=>x.key===ck);chkDeaths();render();flashQ(pi);sv('',heard,players[pi].name+' +'+n+' '+def.label,'');return;}
      if(/vida|vidas/.test(what)){snap();players[pi].life+=n;chkDeaths();render();flashQ(pi);sv('',heard,players[pi].name+' +'+n+' vidas → '+players[pi].life,'');return;}
      if(/man[aá]/.test(what)){snap();players[pi].mana=(players[pi].mana||0)+n;render();showManaToast(pi,n,false);sv('',heard,players[pi].name+' +'+n+' maná','');return;}
    }
  }

  // B: nombre + verbo_perder + N + tipo
  let pB=c.match(/(\w+)\s+(?:pierde|sufre|gasta|baja|descuenta|toma)\s+(\w+)\s+(?:de\s+)?(.+)/);
  if(pB){const pi=findP(pB[1]);const n=toN(pB[2]);const what=pB[3].trim();
    if(pi>=0&&n!==null){
      const ck=resC(what);
      if(ck){snap();players[pi].counters[ck]=Math.max(0,(players[pi].counters[ck]||0)-n);const def=CTRS.find(x=>x.key===ck);render();flashQ(pi);sv('',heard,players[pi].name+' -'+n+' '+def.label,'');return;}
      if(/vida|vidas|da[nñ]o|punto|puntos/.test(what)){snap();players[pi].life-=n;chkDeaths();render();flashQ(pi);sv('',heard,players[pi].name+' -'+n+' → '+players[pi].life,'');return;}
      if(/man[aá]/.test(what)){snap();players[pi].mana=Math.max(0,(players[pi].mana||0)-n);render();showManaToast(pi,-n,false);sv('',heard,players[pi].name+' -'+n+' maná','');return;}
    }
  }

  // B2: nombre + pierde/recibe/sufre + N (sin tipo = vida)
  let pB2=c.match(/(\w+)\s+(?:pierde|recibe|sufre|recibi[oó])\s+(\w+)$/);
  if(pB2){const pi=findP(pB2[1]);const n=toN(pB2[2]);if(pi>=0&&n!==null){snap();players[pi].life-=n;chkDeaths();render();flashQ(pi);sv('',heard,players[pi].name+' -'+n+' → '+players[pi].life,'');return;}}

  // C−: verbos dirigidos negativos → "quítale/bájale/réstale/reduce/daña/pégale N [tipo] a nombre"
  // Con acento y sin acento: quitale=quítale, bajale=bájale, etc.
  let pCn=c.match(/(?:qu[ií]tale|b[aá]jale|r[eé]stale|s[aá]cale|reduce(?:le)?|da[nñ]a(?:le)?|p[eé]gale|le\s+quita|le\s+baja|le\s+resta)\s+(\w+)\s+(?:de\s+)?(.+?)\s+a\s+(\w+)/)||
           c.match(/(?:qu[ií]tale|b[aá]jale|r[eé]stale|s[aá]cale|reduce(?:le)?|da[nñ]a(?:le)?|p[eé]gale|le\s+quita|le\s+baja)\s+(\w+)\s+(?:vidas?\s+|puntos?\s+)?a\s+(\w+)/);
  if(pCn){
    const n=toN(pCn[1]);
    const piStr=pCn[3]||pCn[2];const pi=findP(piStr);
    const what=pCn[3]?pCn[2].trim():null;
    if(n!==null&&pi>=0){
      const ck=what?resC(what):null;
      if(ck){snap();players[pi].counters[ck]=Math.max(0,(players[pi].counters[ck]||0)-n);const def=CTRS.find(x=>x.key===ck);chkDeaths();render();flashQ(pi);sv('',heard,players[pi].name+' -'+n+' '+def.label,'');return;}
      snap();players[pi].life-=n;chkDeaths();render();flashQ(pi);sv('',heard,players[pi].name+' -'+n+' → '+players[pi].life,'');return;
    }
  }

  // C+: verbos dirigidos positivos → "súmale/dale/agrégale N [tipo] a nombre"
  let pCp=c.match(/(?:s[uú]male|dale|agr[eé]gale|a[nñ][aá]dele|s[uú]bele|ponle)\s+(\w+)\s+(?:de\s+)?(.+?)\s+a\s+(\w+)/)||
           c.match(/(?:s[uú]male|dale|ponle)\s+(\w+)\s+(?:vidas?\s+)?a\s+(\w+)/);
  if(pCp){
    const n=toN(pCp[1]);const piStr=pCp[3]||pCp[2];const pi=findP(piStr);const what=pCp[3]?pCp[2].trim():null;
    if(n!==null&&pi>=0){
      const ck=what?resC(what):null;
      if(ck){snap();players[pi].counters[ck]=(players[pi].counters[ck]||0)+n;const def=CTRS.find(x=>x.key===ck);chkDeaths();render();flashQ(pi);sv('',heard,players[pi].name+' +'+n+' '+def.label,'');return;}
      snap();players[pi].life+=n;chkDeaths();render();flashQ(pi);sv('',heard,players[pi].name+' +'+n+' → '+players[pi].life,'');return;
    }
  }

  // D: ponle/dame N tipo [a nombre]
  let pD=c.match(/(?:pon(?:le|me|nos?)?|dame|agrega(?:me)?)\s+(\w+)\s+(?:de\s+)?(.+?)(?:\s+a\s+(\w+))?$/);
  if(pD){const n=toN(pD[1]);const what=pD[2].trim();const pi=pD[3]?findP(pD[3]):findFirst();
    if(n!==null&&pi>=0){
      const ck=resC(what);
      if(ck){snap();players[pi].counters[ck]=(players[pi].counters[ck]||0)+n;const def=CTRS.find(x=>x.key===ck);chkDeaths();render();flashQ(pi);sv('',heard,players[pi].name+' +'+n+' '+def.label,'');return;}
      if(/vida|vidas/.test(what)){snap();players[pi].life+=n;chkDeaths();render();flashQ(pi);sv('',heard,players[pi].name+' +'+n+' vidas → '+players[pi].life,'');return;}
    }
  }

  // "X le quita/baja/pega N vidas a Y"
  let tlAlt=c.match(/(\w+)\s+le\s+(?:quita|baja|resta|pega|hace|da)\s+(\w+)\s+(?:vidas?\s+|de\s+da[nñ]o\s+)?(?:a\s+)?(\w+)/);
  if(tlAlt){const n=toN(tlAlt[2]);const pi=findP(tlAlt[3])||findP(tlAlt[1]);if(n!==null&&pi>=0){snap();players[pi].life-=n;chkDeaths();render();flashQ(pi);sv('',heard,players[pi].name+' -'+n+' → '+players[pi].life,'');return;}}

  sv('',heard,'','⚠ No entendí — Ej: "Lily, bajale 5 a Gabo" · "Lily, Alex es el monarca"');
}


// ════════════════════════════════════════════════════
//  VOICE — wake word LILY
// ════════════════════════════════════════════════════
// ════════════════════════════════════════════════════
//  FIRST PLAYER SELECTOR
// ════════════════════════════════════════════════════
function pickFirstPlayer(){
  const alive = players.filter(p=>!p.dead);
  if(!alive.length) return;
  const ov = document.getElementById('fp-overlay');
  const crown = document.getElementById('fp-crown');
  const nameEl = document.getElementById('fp-name');
  const lbl = document.getElementById('fp-label');
  // Hide real elements, show spinner
  crown.style.display='none';
  nameEl.style.fontSize='32px';
  lbl.textContent='Eligiendo...';
  ov.classList.add('show');
  // Animate through player names
  let ticks=0; const maxTicks=18;
  const timer=setInterval(()=>{
    ticks++;
    const r=alive[Math.floor(Math.random()*alive.length)];
    nameEl.textContent=r.name.toUpperCase();
    nameEl.style.color=r.color;
    if(ticks>=maxTicks){
      clearInterval(timer);
      // Final pick
      const winner=alive[Math.floor(Math.random()*alive.length)];
      nameEl.textContent=winner.name.toUpperCase();
      nameEl.style.color=winner.color;
      nameEl.style.fontSize='56px';
      crown.style.display='block';
      crown.textContent='👑';
      lbl.textContent='PRIMER JUGADOR';
      // Set as active turn
      const idx=players.indexOf(winner);
      if(idx>=0){ activeTurn=idx; turnStart=Date.now(); updateTurnUI(); render(); }
    }
  }, 120);
}

// ════════════════════════════════════════════════════
//  SWIPE GESTURES
//  Swipe izq/der en board = pasar turno
//  Swipe izq/der en hub = pasar turno
// ════════════════════════════════════════════════════
function setupBoardSwipe(){
  const board = document.getElementById('board');
  let sx=0,sy=0,st2=0;
  board.addEventListener('touchstart', e=>{
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; st2=Date.now();
  },{passive:true});
  board.addEventListener('touchend', e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    const dt=Date.now()-st2;
    // Swipe rápido horizontal (>80px, <350ms, más horizontal que vertical)
    if(Math.abs(dx)>80 && Math.abs(dx)>Math.abs(dy)*1.5 && dt<350){
      nextTurn();
      // Visual feedback en el pill
      const pill=document.getElementById('turn-pill');
      if(pill){pill.style.transform='scale(1.15)';setTimeout(()=>pill.style.transform='',200);}
    }
  },{passive:true});
}

function setMic(s){
  wSt=s;const b=document.getElementById('mic-btn');
  b.className='';
  if(s==='on'){b.classList.add('on');b.textContent='🎙';}
  else if(s==='hot'){b.classList.add('hot');b.textContent='⚡';}
  else{b.textContent='🎙';}
}

function initVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){sv('','','Voz no disponible — usa Chrome o Safari iOS','');setMic('off');return;}
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  // Destroy previous instance
  if(recog){try{recog.stop();}catch(e){}}
  recog=new SR();
  recog.lang='es-MX';
  recog.continuous=!isIOS;
  recog.interimResults=!isIOS;

  recog.onresult=e=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const txt=e.results[i][0].transcript;
      if(e.results[i].isFinal)final+=txt;else interim+=txt;
    }
    if(interim){
      document.getElementById('vi').textContent=interim;
      if(WAKE.some(w=>interim.toLowerCase().includes(w))&&wSt==='on')setMic('hot');
    }
    if(final){
      document.getElementById('vi').textContent='';
      const tl=final.toLowerCase().trim();
      // Check wake word
      const wf=WAKE.find(w=>tl.startsWith(w));
      if(wf){
        const cmd=final.substring(wf.length).replace(/^[,\.\s]+/,'');
        if(cmd.length>1)parseCmd(final);
        else sv('',wf,'Escuchando comando…','');
        setMic('on');
      }
      // iOS: restart after each result
      if(isIOS&&wOn){
        setTimeout(()=>{try{if(recog&&wOn)recog.start();}catch(e){}},250);
      }
    }
  };

  recog.onend=()=>{
    const isIOS2=/iphone|ipad|ipod/i.test(navigator.userAgent);
    if(wOn&&!isIOS2){
      // Desktop: auto-restart
      setTimeout(()=>{try{if(recog&&wOn)recog.start();}catch(e){}},100);
    } else if(!wOn){
      setMic('off');
    }
  };

  recog.onerror=e=>{
    if(e.error==='not-allowed'){
      sv('','','Permiso de micrófono denegado','');
      wOn=false;setMic('off');
    } else if(e.error==='no-speech'&&wOn){
      const isIOS3=/iphone|ipad|ipod/i.test(navigator.userAgent);
      if(isIOS3)setTimeout(()=>{try{if(recog&&wOn)recog.start();}catch(e2){}},400);
    } else if(e.error!=='aborted'){
      console.warn('Speech error:',e.error);
    }
  };

  setMic('off');
}

function toggleWake(){
  if(!recog){sv('','','','Voz no disponible');return;}
  if(wOn){
    wOn=false;
    try{recog.abort();}catch(e){}
    setMic('off');
    hv();
  } else {
    wOn=true;
    setMic('on');
    try{recog.start();}catch(e){
      // Already started or other error — try reinit
      initVoice();
      setTimeout(()=>{try{recog.start();wOn=true;setMic('on');}catch(e2){}},200);
    }
    document.getElementById('vbar').classList.add('show');
    document.getElementById('va').textContent='Escuchando… di "Lily, [comando]"';
  }
}

// Wake Lock
async function wl(){try{if('wakeLock' in navigator)await navigator.wakeLock.request('screen');}catch(e){}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')wl();});
wl();

buildSetup();
